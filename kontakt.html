<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakt Konfidensiell | IT-hjelp, AI og digitale tjenester</title>
    <meta
      name="description"
      content="Kontakt Konfidensiell for IT-hjelp, AI teknologi, nettsider, portaler, apputvikling, hosting og digitale tjenester."
    />
    <meta
      name="keywords"
      content="Kontakt Konfidensiell, IT hjelp, AI teknologi, digitale tjenester, nettside hjelp, portal"
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://konfidensiell.no/kontakt.html" />
    <link rel="stylesheet" href="assets/styles/main.css" />
    <link rel="stylesheet" href="assets/styles/image-cleanup.css" />
    <link rel="stylesheet" href="assets/styles/layout-overrides.css" />
    <link rel="stylesheet" href="assets/styles/kontakt-page.css" />
    <link rel="stylesheet" href="assets/styles/page-fill.css" />
    <script defer src="assets/scripts/app.js"></script>
  </head>
  <body data-page="home" class="kontakt-page page-fill">
    <main class="page-shell">
      <section class="section-wrap">
        <div data-site-header></div>
        <section class="section-space">
          <div class="contact-panel">
            <div class="contact-grid">
              <aside class="channel-card">
                <h3>Våre Kanaler</h3>
                <div class="channel-block">
                  <strong>E-Post</strong>
                  <div class="channel-pill">support@konfidensiell.no</div>
                </div>
                <div class="channel-block">
                  <strong>Sted</strong>
                  <div class="channel-pill">Norge - Kristiansand</div>
                </div>
                <div class="channel-block">
                  <strong>Responstid</strong>
                  <div class="channel-pill">2 - 7 Virkedager</div>
                </div>
                <div class="channel-block">
                  <strong>Sosiale Medier</strong>
                  <div class="social-row">
                    <a href="#" aria-label="LinkedIn"><img src="assets/images/linkedin.svg" alt="" /></a>
                    <a href="#" aria-label="Instagram"><img src="assets/images/instagram.svg" alt="" /></a>
                    <a href="#" aria-label="GitHub"><img src="assets/images/github.svg" alt="" /></a>
                  </div>
                </div>
              </aside>
              <form class="contact-form">
                <h2>Kontakt Oss</h2>
                <div class="form-grid">
                  <label class="field-group">
                    <span>Navn / Bedrift</span>
                    <input class="field-input" type="text" placeholder="Ola Norman" />
                  </label>
                  <label class="field-group">
                    <span>E-Post</span>
                    <input class="field-input" type="email" placeholder="olanorman@eksempel.com" />
                  </label>
                  <label class="field-group full">
                    <span>Prosjekt</span>
                    <input class="field-input" type="text" placeholder="Hvordan kan vi hjelpe deg?" />
                  </label>
                  <label class="field-group full">
                    <span>Navn / Bedrift</span>
                    <textarea class="field-area" placeholder="Fortell oss om ditt prosjekt..."></textarea>
                  </label>
                </div>
              </form>
            </div>
          </div>
        </section>
        <div data-site-footer></div>
      </section>
    </main>
  </body>
</html>
